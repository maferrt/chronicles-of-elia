services:
  postgres:
    image: postgres:16
    container_name: chronicles_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - chronicles_postgres_data:/var/lib/postgresql/data

volumes:
  chronicles_postgres_data: